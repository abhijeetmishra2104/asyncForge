services:
  - type: web
    name: asyncforge-web
    env: node

    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm db:generate
      pnpm build

    startCommand: pnpm start

    healthCheckPath: /api/health

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: RABBITMQ_URL
        sync: false

      - key: GROQ_API_KEY
        sync: false

  - type: worker
    name: asyncforge-dispatcher
    env: node

    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm db:generate

    startCommand: pnpm dispatcher

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: RABBITMQ_URL
        sync: false

  - type: worker
    name: asyncforge-worker
    env: node

    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm db:generate

    startCommand: pnpm worker

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: RABBITMQ_URL
        sync: false

      - key: GROQ_API_KEY
        sync: false