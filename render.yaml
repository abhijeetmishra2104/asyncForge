services:
  - type: web
    name: asyncforge-v2-web
    env: node

    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm db:generate
      pnpm db:deploy
      pnpm build

    startCommand: pnpm start

    healthCheckPath: /api/health

  - type: worker
    name: asyncforge-dispatcher
    env: node

    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm db:generate

    startCommand: pnpm dispatcher

  - type: worker
    name: asyncforge-worker
    env: node

    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm db:generate

    startCommand: pnpm worker